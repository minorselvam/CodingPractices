name: Build and Push to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to ACR
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build and Push Docker image
      run: |
        cd Azure-Practices/AzureServiceBus/ShoppingMicroServices/OrderService/OrderService
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/orderapi:v1 .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/orderapi:v1
