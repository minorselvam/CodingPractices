name: CI/CD Pipeline   # Workflow name shown in Actions tab

on:
  push:
    branches: [ "main" ]
    paths:
      - 'DotNetCore/DotNetCoreWebApi/**'
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Allows checkout

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::491799435544:role/eks-deploy-role
        aws-region: ap-south-2

    - name: Login to Amazon ECR Public
      run: |
        aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws/y1i1b5g3

    - name: Build Docker image
      run: docker build -t my-dotnet-api-repo -f DotNetCore/DotNetCoreWebApi/DotNetCoreWebApi/Dockerfile DotNetCore/DotNetCoreWebApi/DotNetCoreWebApi

    - name: Tag Docker image
      run: docker tag my-dotnet-api-repo:latest public.ecr.aws/y1i1b5g3/my-dotnet-api-repo:latest

    - name: Push Docker image to ECR Public
      run: docker push public.ecr.aws/y1i1b5g3/my-dotnet-api-repo:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::491799435544:role/eks-deploy-role
        aws-region: ap-south-2

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region ap-south-2 --name my-eks-cluster-1

    - name: Deploy to EKS
      run: |
        kubectl set image deployment/dotnet-api-deployment dotnet-api-container=public.ecr.aws/y1i1b5g3/my-dotnet-api-repo:latest
        kubectl rollout status deployment/dotnet-api-deployment


# ---------------------------------------------------------
# Step Definitions
# Step 1: Checkout code → Pulls repository files into the GitHub runner.
# Step 2: Configure AWS credentials with OIDC role → Authenticates runner securely with AWS account.
# Step 3: Login to Amazon ECR Public → Grants Docker permission to push images to AWS ECR Public.
# Step 4: Build Docker image → Creates a container image from your .NET Core Web API Dockerfile.
# Step 5: Tag Docker image → Assigns repository path and version tag to the image.
# Step 6: Push Docker image to ECR Public → Uploads the image to AWS ECR Public registry.
# Step 7: Checkout code (deploy job) → Fetches repository files again for deployment context.
# Step 8: Configure AWS credentials with OIDC role → Uses IAM role for secure authentication.
# Step 9: Update kubeconfig for EKS → Connects kubectl to your EKS cluster.
# Step 10: Deploy to EKS → Updates Kubernetes deployment with the new Docker image and waits for rollout.
# ---------------------------------------------------------

# ---------------------------------------------------------
# Pipeline Flow Diagram
#
#   ┌───────────────┐
#   │   Checkout    │  (Step 1)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │ Configure AWS │  (Step 2)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │   Login ECR   │  (Step 3)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │   Build Img   │  (Step 4)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │   Tag Img     │  (Step 5)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │   Push Img    │  (Step 6)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │   Deploy Job  │
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │   Checkout    │  (Step 7)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │ Configure AWS │  (Step 8)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │ Update Config │  (Step 9)
#   └──────┬────────┘
#          │
#   ┌──────▼────────┐
#   │   Deploy EKS  │  (Step 10)
#   └───────────────┘
#
# ---------------------------------------------------------
